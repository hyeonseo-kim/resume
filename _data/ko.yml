profile:
  show: true
  order: 1
  title: 소개
  description: |
    이화여자대학교에서 통계학을 전공하고 있으며, 수학과 경제학을 복수전공하고 있습니다.
    통계적 모형화, 계량경제학, 리스크 관리, 보험 분석, 데이터 기반 연구에 관심이 있으며, 정량적 방법을 실제 경제·금융 문제에 적용하는 데 중점을 두고 있습니다.

experience:
  show: true
  order: 2
  title: 경험
  items:
    - company: 이화보험학회
      link: https://www.instagram.com/ewha_eis/
      tags: 학술, 연구
      date: 2025.03 - 2026.02
      role: 학회원
      location: 서울, 대한민국
      description: |
        보험, 리스크 관리, 인슈어테크와 관련된 학술 학습과 토의에 참여하였습니다.
        + 보험 상품, 산업 동향, 리스크 관련 주제를 분석하였습니다.
        + 보험 분석 및 계리 응용 분야에 대한 학문적 관심을 확장하였습니다.

    - company: 대한민국 대학생 교육기부단
      link: https://www.instagram.com/edufordonation/
      tags: 리더십, 운영
      date: 2025.03 - 현재
      role: 단장 (전 대외협력팀장)
      location: 서울, 대한민국
      description: |
        조직 운영 기획과 교육봉사 활동을 총괄하였습니다.
        + 리더십과 대외협력 경험을 바탕으로 대외협력팀장에서 단장으로 선임되었습니다.
        + 교육 확장을 위한 대외 협력과 이해관계자 소통을 지원하였습니다.
        + 팀 기반 교육 프로그램과 조직 운영을 조정하였습니다.

project:
  show: true
  order: 3
  title: 프로젝트

  items:
    - name: 우울, 자녀 교류, 사회활동 간 상관관계 및 회귀분석
      link:
      tags: 통계, 회귀분석, 정책
      date: 2025
      description: |
        노인의 우울 점수에 자녀와의 만남 빈도, 연락 빈도, 사회활동 빈도가 미치는 영향을 분석하였습니다.
        + 실증분석을 위해 변수 전처리와 표준화를 수행하였습니다.
        + 사회적 변수와 가족 관련 변수 간 상호작용 가능성을 검토하였습니다.
        + 분석 결과를 바탕으로 정책적 시사점을 도출하였습니다.

    - name: 포트폴리오 최적화 및 CAPM 분석
      link:
      tags: 금융계량, R, 리스크 분석
      date: 2025
      description: |
        과거 금융 데이터를 바탕으로 포트폴리오의 위험과 수익을 실증적으로 분석하였습니다.
        + Value at Risk 분석과 포트폴리오 최적화를 수행하였습니다.
        + CAPM 회귀분석을 적용하고 결과를 금융 맥락에서 해석하였습니다.

    - name: 보험 분석 및 IFRS 17 연구
      link:
      tags: IFRS 17, 보험 분석, 리스크 관리, 인슈어테크
      date: 2025
      description: |
        통계적 방법을 보험 및 리스크 관리 문제에 연결하는 정량 연구 주제를 탐구하였습니다.
        + IFRS 17 하에서 해지율 가정 오차가 CSM과 미래 현금흐름 현재가치에 미치는 영향을 검토하였습니다.
        + 자동차보험 모형, 건강검진 할인특약 등 보험 상품 분석과 인슈어테크 동향을 살펴보았습니다.
        + 가정 오차가 재무성과와 리스크 관리 의사결정에 미치는 영향을 검토하였습니다.

