    Academic projects focused on statistical analysis, econometrics, finance, and insurance-related research.

  items:
    - name: Analysis of Depression, Family Contact, and Social Activity
      link: 
      tags: Statistics, Regression Analysis, Policy
      date: 2025
      description: |
        Studied how social activity, meeting frequency with children, and contact frequency with children affect depression scores among older adults.
        + Processed and standardized variables for empirical analysis
        + Investigated interaction patterns among social and family-related variables
        + Considered policy implications based on analytical findings

    - name: Portfolio Optimization and CAPM Analysis
      link: 
      tags: Financial Econometrics, R, Risk Analysis
      date: 2025
      description: |
        Conducted empirical analysis using historical financial data to examine portfolio risk and return.
        + Performed Value at Risk analysis and portfolio optimization
        + Applied CAPM regression and interpreted results in a financial context

    - name: Insurance Analytics & IFRS 17
      link:
      tags: IFRS 17, Insurance Analytics, Risk Management, InsurTech
      date: 2025
      description: |
        Explored quantitative research topics connecting statistical methods with insurance and risk management.
        + Examined the financial impact of lapse rate assumption errors on Contractual Service Margin (CSM) and future cash flow valuation under IFRS 17
        + Studied product analytics and InsurTech trends, including auto insurance models and health check-up discount riders
        + Considered how assumption errors may affect financial outcomes and risk management decisions
        
